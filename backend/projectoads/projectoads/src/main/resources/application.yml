spring:
  application:
    name: projectoads

  servlet:
    multipart:
      max-file-size: ${NEXUS_UPLOAD_MAX_FILE_SIZE:10MB}
      max-request-size: ${NEXUS_UPLOAD_MAX_REQUEST_SIZE:10MB}

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/TB_ADS}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    show-sql: ${JPA_SHOW_SQL:false}
    properties:
      hibernate:
        format_sql: ${JPA_FORMAT_SQL:false}

server:
  port: 8081

jwt:
  secret: ${JWT_SECRET:nexus-one-dev-jwt-secret-change-before-production-2026}
  expiration-ms: ${JWT_EXPIRATION_MS:3600000}

asaas:
  enabled: ${ASAAS_ENABLED:false}
  api-key: ${ASAAS_API_KEY:}
  base-url: ${ASAAS_BASE_URL:https://api-sandbox.asaas.com/v3}
  webhook-token: ${ASAAS_WEBHOOK_TOKEN:}

notifications:
  enabled: ${NOTIFICATIONS_ENABLED:false}
  webhook-url: ${NOTIFICATIONS_WEBHOOK_URL:}
  token: ${NOTIFICATIONS_TOKEN:}
  follow-up-cron: ${NOTIFICATIONS_FOLLOW_UP_CRON:0 0 8 * * *}
  stock-cron: ${NOTIFICATIONS_STOCK_CRON:0 15 8 * * *}
  daily-summary-cron: ${NOTIFICATIONS_DAILY_SUMMARY_CRON:0 0 18 * * *}

nexus:
  security:
    allowed-origins: ${NEXUS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,http://127.0.0.1:5173,http://127.0.0.1:5174}

  uploads:
    ordens-servico-dir: ${NEXUS_OS_UPLOAD_DIR:uploads/ordens-servico}

  fiscal:
    xml-signer: ${NEXUS_FISCAL_XML_SIGNER:controlled}
    provider: ${NEXUS_FISCAL_PROVIDER:controlled}
    http:
      connect-timeout-ms: ${NEXUS_FISCAL_HTTP_CONNECT_TIMEOUT_MS:3000}
      read-timeout-ms: ${NEXUS_FISCAL_HTTP_READ_TIMEOUT_MS:10000}
      status-read-timeout-ms: ${NEXUS_FISCAL_HTTP_STATUS_READ_TIMEOUT_MS:3000}
